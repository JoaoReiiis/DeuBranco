services:

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: deubranco
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d deubranco"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./deu-branco-api
      dockerfile: Dockerfile
    environment:
      DB_URL: jdbc:postgresql://db:5432/deubranco
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: deu-branco-api-docker-secret-must-be-32b
      JWT_EXPIRATION_IN_SECONDS: 3600
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  pgdata:
