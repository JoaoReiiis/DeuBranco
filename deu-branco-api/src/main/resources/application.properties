spring.application.name=deu-branco-api

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/mydatabase}
spring.datasource.username=${DB_USERNAME:myuser}
spring.datasource.password=${DB_PASSWORD:secret}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.open-in-view=false

app.security.jwt.secret=${JWT_SECRET:deu-branco-api-dev-secret-key-precisa-ter-32-bytes}
app.security.jwt.expiration-in-seconds=${JWT_EXPIRATION_IN_SECONDS:3600}
